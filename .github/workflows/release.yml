name: release
on:
  push:
    tags:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  create-release:
    uses: quotidian-ennui/workflows-olio/.github/workflows/create-release.yml@eff82979a276acf5fdad410c646fc2527dbc3331 # v2.2.4
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
