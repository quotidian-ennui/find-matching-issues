name: release
on:
  push:
    tags:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  create-release:
    uses: quotidian-ennui/workflows-olio/.github/workflows/create-release.yml@fbf6d0730e3cd74f770b6a6d1e9a105c1a681d83 # v2.2.2
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
