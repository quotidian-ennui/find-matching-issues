name: release
on:
  push:
    tags:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  create-release:
    uses: quotidian-ennui/workflows-olio/.github/workflows/create-release.yml@ba459193955c8bc8339e4fa8e3a135530b6917ff # v2.2.0
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
