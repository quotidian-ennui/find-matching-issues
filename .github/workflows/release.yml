name: release
on:
  push:
    tags:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  create-release:
    uses: quotidian-ennui/workflows-olio/.github/workflows/create-release.yml@c8d7effd8c6aeea7b0badd21cb31377207e9a89c # v2.0.0
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
