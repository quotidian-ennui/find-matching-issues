name: release
on:
  push:
    tags:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  create-release:
    uses: quotidian-ennui/workflows-olio/.github/workflows/create-release.yml@bc5a8ca54a283873850632edff9d64a78431e63c # v2.2.3
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
