version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    open-pull-requests-limit: 20
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:07"
      timezone: "Europe/London"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "deps(actions): "
    groups:
      workflows-olio:
        patterns:
          - "quotidian-ennui/workflows-olio/*"
